<app-loading *ngIf="loading" class="m-3"></app-loading>
<div class="row animated fadeIn m-3" *ngIf="!loading">
    <div class="col-2">
        <img [src]="artist.images | noimage" class="img-thumbnail img-circle">
    </div>
    <div class="col">
        <h3>{{ artist.name }}</h3>
        <p>
            <a [href]="artist.external_urls.spotify" target="_blank">
                Ir a la pagina del artista
            </a>
        </p>
    </div>
    <div class="col-4 text-right">
        <button routerLink="/search" class="btn btn-outline-danger">
            Regresar
        </button>
    </div>

    <div class="row m-5">
        <div class="col">
            <table class="table table-dark text-white">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Album</th>
                        <th>Canción</th>
                        <th>Vista Previa</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let topTrack of topTracks" class="text-center align-middle">
                        <td>
                            <img [src]="topTrack.album.images | noimage" class="img-thumb">
                        </td>
                        <td>{{ topTrack.album.name }}</td>
                        <td>{{ topTrack.name }}</td>
                        <td>
                            <!-- <audio *ngIf="topTrack.preview_url" [src]="topTrack.preview_url" controls></audio>
                            <span *ngIf="!topTrack.preview_url" class="text">Vista previa no Disponible</span> -->
                            <iframe width="300" height="160" title="Spotify Embed: My Path to Spotify: Women in Engineering" 
                            style="border-radius: 12px" frameborder="0" 
                            allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                            [src]="topTrack.uri | domseguro"></iframe>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
